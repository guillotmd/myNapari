[workspace]
authors = ["John Jackson <jdjacks@sbcglobal.net>", "Yakub Bayhaqi <yakub.rouge@gmail.com>"]
channels = ["conda-forge"]
name = "napari-cool-tools-plugins"
platforms = ["linux-64", "win-64"]
version = "0.1.0"

[dependencies]
# We need a python version that is compatible with pytorch
python = ">=3.9,<3.12"
pip = ">=25.2,<26"
imageio-ffmpeg = ">=0.6.0,<0.7"

[pypi-dependencies]
numpy = "==1.23.5"
PyQt5-Qt5 = "==5.15.2"
PyQt5 = "==5.15.*"
napari = "==0.5.6"
napari-cool-tools-img-proc = { path = "napari-cool-tools-img-proc", editable = true }
napari-cool-tools-io = { path = "napari-cool-tools-io", editable = true }
napari-cool-tools-oct-preproc = { path = "napari-cool-tools-oct-preproc", editable = true }
napari-cool-tools-registration = { path = "napari-cool-tools-registration", editable = true }
napari-cool-tools-segmentation = { path = "napari-cool-tools-segmentation", editable = true }
napari-cool-tools-vol-proc = { path = "napari-cool-tools-vol-proc", editable = true }
napari-cool-tools-vol-render = { path = "./napari-cool-tools-vol-render", editable = true }
napari-cool-tools-submenu-patch = { path = "napari-cool-tools-submenu-patch", editable = true }
florian-batch-proc = { path = "florian-batch-proc", editable = true }
florian-segmentation-mac = { path = "florian-segmentation-mac", editable = true }
florian-quadratic-tumor-vol = { path = "florian-quadratic-tumor-vol", editable = true }
florian-menu-patch = { path = "florian-menu-patch", editable = true }
napari-plugin-manager = "*"
kornia = "==0.8.*"
flatbuffers = "==25.2.*"
packaging = "==26.*"
protobuf = "==6.30.*"
matplotlib = "==3.9.*"
ruamel-yaml = "==0.18.6"
tomlkit = "==0.13.*"
opencv-python = "==4.11.0.*"
pyqtgraph = "==0.13.*"
ffmpeg = ">=1.4, <2"
ffmpeg-python = ">=0.2.0, <0.3"
tensorboard = "==2.20.*"
pyvistaqt = "==0.11.*"

[feature.cuda12]
system-requirements = { cuda = "12.0" }

[feature.cuda12.pypi-dependencies]
nvidia-cuda-runtime-cu12 = "==12.8.*"
torch = { version = "==2.7.*", index = "https://download.pytorch.org/whl/cu128" }
torchvision = { version = "==0.22.*", index = "https://download.pytorch.org/whl/cu128" }
torchaudio = { version = "==2.7.*", index = "https://download.pytorch.org/whl/cu128" }
onnxruntime-gpu = { version = "==1.19.*", index = "https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/onnxruntime-cuda-12/pypi/simple/" }
optuna = "==4.3.*"
cupy-cuda12x = "==13.4.*"
tensorrt = "==10.2.*"
tensorrt-cu12-libs = "==10.2.*"
tensorrt-cu12-bindings = "==10.2.*"

[feature.cpu.pypi-dependencies]
torch = { version = "==2.4.*", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = "==0.19.*", index = "https://download.pytorch.org/whl/cpu" }
torchaudio = { version = "==2.4.*", index = "https://download.pytorch.org/whl/cpu" }
onnxruntime = "==1.19.*, <2"

[environments]
cpu = { features = ["cpu"]}
cuda12 = { features = ["cuda12"] }

[environments.default]
features = ["cuda12"]
