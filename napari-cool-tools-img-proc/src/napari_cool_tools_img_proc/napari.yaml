name: napari-cool-tools-img-proc
display_name: COOL B-scan/Image Processing 
contributions:
  commands:
    - id: napari-cool-tools-img-proc.init_bscan_preproc
      title: Initial Bscan Preprocessing
      python_name: napari_cool_tools_img_proc._equalization:init_bscan_preproc_plugin
      category: Image Processing
    - id: napari-cool-tools-img-proc.background_removal
      title: Background Removal
      python_name: napari_cool_tools_img_proc._equalization:background_removal_plugin
      category: Image Processing
    - id: napari-cool-tools-img-proc.convert_dtype
      title: Convert the images datatype
      python_name: napari_cool_tools_img_proc._normalization:convert_dtype_plugin
      category: Image Processing
    - id: napari-cool-tools-img-proc.normalize
      python_name: napari_cool_tools_img_proc._normalization:normalize_in_range
      title: Normailze Values to Range
    - id: napari-cool-tools-img-proc.standardize
      python_name: napari_cool_tools_img_proc._normalization:standardize_image_plugin
      title: Standardize Image
    - id: napari-cool-tools-img-proc.adjust_gamma
      python_name: napari_cool_tools_img_proc._luminance:adjust_gamma
      title: Gamma Adjustment
    - id: napari-cool-tools-img-proc.adjust_log
      python_name: napari_cool_tools_img_proc._luminance:adjust_log
      title: Log Adjustment
    - id: napari-cool-tools-img-proc.clahe
      title: Contrast Limited Adaptive Histogram Equalization
      python_name: napari_cool_tools_img_proc._equalization:clahe
    - id: napari-cool-tools-img-proc.diff_of_gaus
      title: Band-pass (Difference of Gaussian)
      python_name: napari_cool_tools_img_proc._denoise:diff_of_gaus_plugin
    - id: napari-cool-tools-img-proc.match_histogram
      title: Match Histograms
      python_name: napari_cool_tools_img_proc._equalization:match_histogram
    - id: napari-cool-tools-img-proc.denoise_tv
      title: Total Variation Denoising (Chambolle)
      python_name: napari_cool_tools_img_proc._denoise:denoise_tv_plugin
    - id: napari-cool-tools-img-proc.bilateral
      title: Bilateral Filter
      python_name: napari_cool_tools_img_proc._filters:filter_bilateral
    - id: napari-cool-tools-img-proc.unsharp
      title: Sharpen (Unsharp Mask)
      python_name: napari_cool_tools_img_proc._filters:sharpen_um
    - id: napari-cool-tools-img-proc.mean
      title: Mean Blur
      python_name: napari_cool_tools_img_proc._filters:filter_mean
    - id: napari-cool-tools-img-proc.median
      title: Median Blur
      python_name: napari_cool_tools_img_proc._filters:filter_median
    - id: napari-cool-tools-img-proc.gblur
      title: Gaussian Blur
      python_name: napari_cool_tools_img_proc._filters:filter_gaussian_blur_plg
    - id: napari-cool-tools-img-proc.pad2D
      title: Pad 2D
      python_name: napari_cool_tools_img_proc._nn_tools_2D:pad_image2D_plg
    - id: napari-cool-tools-img-proc.pooling
      title: Pooling 2D
      python_name: napari_cool_tools_img_proc._nn_tools_2D:pool_2D_plg
    - id: napari-cool-tools-img-proc.morph_dialtion
      title: Dilation(Morph)
      python_name: napari_cool_tools_img_proc._morphology:morphological_dilation_plugin
      category: Morphology
    - id: napari-cool-tools-img-proc.morph_erosion
      title: Erosion(Morph)
      python_name: napari_cool_tools_img_proc._morphology:morphological_erosion_plugin
      category: Morphology
    - id: napari-cool-tools-img-proc.resize_image
      title:  Resize Image/Label
      python_name: napari_cool_tools_img_proc._resize:resize_image_plugin
    - id: napari-cool-tools-img-proc.downsample_image
      title:  Downsample Image/Label
      python_name: napari_cool_tools_img_proc._downsample:downsample_image_plugin
    - id: napari-cool-tools-img-proc.shift_label
      title: Shift Image/Label
      python_name: napari_cool_tools_img_proc._shift:shift_image_plugin
    - id: napari-cool-tools-img-proc.image_arithmetic
      title: Image Arithmetic
      python_name: napari_cool_tools_img_proc._image_arithmetic:image_arithmetic_plugin
    - id: napari-cool-tools-img-proc.generate_logscaled_image
      title: Generate Logscaled Image
      python_name: napari_cool_tools_img_proc._log_scale:generate_logscaled_image_plugin
    - id: napari-cool-tools-img-proc.flip_image
      title: Flip Image/Label
